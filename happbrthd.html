<!DOCTYPE html>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffe6f2,#fff5e6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    text-align:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    max-width:450px;
}

button{
    padding:12px 20px;
    margin-top:15px;
    border:none;
    border-radius:20px;
    font-size:16px;
    cursor:pointer;
}

.pink{ background:#ffb6c1; }
.gray{ background:#ddd; }

textarea{
    width:100%;
    height:260px;
    margin-top:15px;
    padding:12px;
    border-radius:15px;
    font-size:14px;
}

img{
    width:100%;
    border-radius:20px;
    margin-top:15px;
    object-fit: cover;
}

.hidden{ display:none; }

.fade{ animation: fade 0.5s ease; }

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

iframe{
    width:100%;
    margin-top:15px;
    border:none;
    border-radius:15px;
}
</style>
</head>
